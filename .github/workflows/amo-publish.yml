name: Publish to AMO

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION != manifest.json $MANIFEST_VERSION"
            exit 1
          fi

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Build extension package
        run: |
          web-ext build --source-dir=. --artifacts-dir=./dist \
            --ignore-files="tests/**" "docs/**" "badges/**" ".github/**" \
            "node_modules/**" "package*.json" ".eslint*" ".prettier*" \
            "*.md" ".gitignore" "dist/**" ".claude/**" "settings.local.json"

      - name: Submit to AMO
        run: |
          web-ext sign --source-dir=. --artifacts-dir=./dist \
            --channel=listed \
            --api-key=${{ secrets.AMO_JWT_ISSUER }} \
            --api-secret=${{ secrets.AMO_JWT_SECRET }}
